<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG 遊戲：我獨自升級 (衍生版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .game-container {
            width: 100%;
            max-width: 800px;
            background: #1e1e1e;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        #api-setup {
            padding: 15px;
            background: #2a2a2a;
            border-bottom: 1px solid #444;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        #api-key-input {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            background: #121212;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
        }
        .status-bar {
            background: #252526;
            padding: 12px 15px;
            border-bottom: 2px solid #333;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px;
        }
        .status-item { display: flex; flex-direction: column; gap: 4px; }
        .status-label { font-size: 11px; color: #aaa; text-transform: uppercase; }
        .status-value { font-size: 15px; font-weight: bold; color: #fff; }
        .progress-container {
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 2px;
        }
        .progress-bar { height: 100%; width: 100%; transition: width 0.3s ease; }
        .hp-bar { background: #e74c3c; }
        .mp-bar { background: #3498db; }
        .exp-bar { background: #f1c40f; }

        #exp-status-item { display: none; }

        .story-panel {
            padding: 15px;
            height: 380px;
            overflow-y: auto;
            line-height: 1.6;
            font-size: 15px;
            background: #181818;
            border-bottom: 1px solid #333;
        }
        .story-text { margin-bottom: 15px; white-space: pre-wrap; }
        .inventory-panel {
            padding: 10px 15px;
            background: #202020;
            border-bottom: 1px solid #333;
            font-size: 13px;
            color: #bbb;
        }
        .choices-panel {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #1e1e1e;
        }
        .custom-input-box {
            display: flex;
            gap: 8px;
            margin-bottom: 5px;
        }
        #custom-text-input {
            flex: 1;
            padding: 10px 12px;
            background: #121212;
            border: 1px solid #4a5568;
            color: #fff;
            border-radius: 6px;
            font-size: 14px;
        }
        .btn {
            padding: 8px 12px;
            background: #2d3748;
            color: #edf2f7;
            border: 1px solid #4a5568;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        .btn:hover:not(:disabled) { background: #4a5568; border-color: #63b3ed; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .send-btn {
            background: #3182ce;
            border-color: #4299e1;
            text-align: center;
            padding: 10px 16px;
        }
        .send-btn:hover:not(:disabled) { background: #2b6cb0; }
        .save-btn { background: #2f855a; border-color: #38a169; text-align: center; }
        .save-btn:hover:not(:disabled) { background: #276749; }
        .manual-save-option-btn {
            background: #276749 !important;
            border-color: #38a169 !important;
            color: #e6fffa !important;
            font-weight: bold;
        }
        .manual-save-option-btn:hover:not(:disabled) {
            background: #2f855a !important;
        }
        .loading { display: none; color: #f1c40f; text-align: center; margin: 10px 0; font-size: 14px; }

        /* 🎲 Dice Roll & Save Manager Modal Overlay */
        .dice-overlay, .modal-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }
        .modal-box {
            background: #2a2a2a;
            border: 2px solid #3182ce;
            border-radius: 12px;
            padding: 20px;
            width: 95%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(49, 130, 206, 0.3);
        }
        .modal-title { font-size: 18px; color: #63b3ed; margin-bottom: 15px; font-weight: bold; }
        .slot-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .slot-card {
            background: #181818;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-align: left;
        }
        .slot-info { font-size: 12px; color: #ccc; }
        .slot-name { font-size: 14px; font-weight: bold; color: #fff; }
        .slot-btns { display: flex; gap: 5px; }
        .dice-box {
            background: #2a2a2a;
            border: 2px solid #f1c40f;
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.3);
        }
        .dice-title { font-size: 18px; color: #f1c40f; margin-bottom: 10px; font-weight: bold; }
        .dice-desc { font-size: 14px; color: #ddd; margin-bottom: 20px; line-height: 1.4; }
        .dice-display {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            margin: 15px 0;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #121212;
            border-radius: 8px;
            border: 1px solid #555;
        }
        .dice-btn {
            background: #e74c3c;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }
        .dice-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

<div class="game-container">
    <div id="api-setup">
        <label for="api-key-input" style="font-size: 12px;">API Key:</label>
        <input type="password" id="api-key-input" placeholder="貼上 Gemini API Key">
        <button class="btn" onclick="startGame()">新遊戲</button>
        <button class="btn save-btn" onclick="openSaveManager()">📂 存檔管理</button>
    </div>

    <div class="status-bar">
        <div class="status-item">
            <span class="status-label">姓名/階級</span>
            <span class="status-value" id="ui-name">未創角 (E級)</span>
        </div>
        <div class="status-item">
            <span class="status-label">HP (生命值)</span>
            <span class="status-value" id="ui-hp-text">20 / 20</span>
            <div class="progress-container"><div id="ui-hp-bar" class="progress-bar hp-bar"></div></div>
        </div>
        <div class="status-item">
            <span class="status-label">MP (魔力值)</span>
            <span class="status-value" id="ui-mp-text">10 / 10</span>
            <div class="progress-container"><div id="ui-mp-bar" class="progress-bar mp-bar"></div></div>
        </div>
        
        <div class="status-item" id="locked-status-item">
            <span class="status-label">成長系統</span>
            <span class="status-value" style="color: #888;">🔒 成長鎖定</span>
        </div>

        <div class="status-item" id="exp-status-item">
            <span class="status-label">等級 / 經驗值</span>
            <span class="status-value" id="ui-level-text">Lv.1 (0/100)</span>
            <div class="progress-container"><div id="ui-exp-bar" class="progress-bar exp-bar"></div></div>
        </div>
    </div>

    <div class="inventory-panel">
        🎒 <strong>背包物品：</strong> <span id="ui-inventory">無</span>
    </div>

    <div class="story-panel" id="story-panel">
        <div class="story-text">歡迎來到《我獨自升級》衍生版 TRPG。請在上方的輸入框貼上你的 Gemini API Key，然後點擊「新遊戲」開始創角，或點擊「📂 存檔管理」讀取/儲存角色進度。</div>
    </div>

    <div class="loading" id="loading">AI 主持人正在閱讀規則與思考中，請稍後...</div>

    <div class="choices-panel" id="choices-panel">
        <div class="custom-input-box" id="custom-input-box">
            <input type="text" id="custom-text-input" placeholder="在這裡輸入文字 (例如: 姓名/性別 或 自由行動)..." onkeypress="handleKeyPress(event)">
            <button class="btn send-btn" id="send-input-btn" onclick="sendCustomInput()">送出</button>
        </div>
        <div id="button-options-container" style="display: flex; flex-direction: column; gap: 8px;"></div>
    </div>

    <!-- 📂 多角色存檔管理 Modal -->
    <div class="modal-overlay" id="save-modal-overlay">
        <div class="modal-box">
            <div class="modal-title">📂 多角色存檔管理</div>
            <div class="slot-list" id="slot-list"></div>
            <button class="btn send-btn" style="width: 100%;" onclick="closeSaveManager()">關閉面板</button>
        </div>
    </div>

    <!-- 🎲 Dice Roll Modal Overlay -->
    <div class="dice-overlay" id="dice-overlay">
        <div class="dice-box">
            <div class="dice-title" id="dice-title">🎲 需要進行 D20 行動檢定</div>
            <div class="dice-desc" id="dice-desc">請投擲 D20 決定行動成敗</div>
            <div class="dice-display" id="dice-display">🎲</div>
            <button class="dice-btn" id="dice-btn" onclick="rollDice()">投擲 20 面骰 (D20)</button>
        </div>
    </div>
</div>

<script>
let chatHistory = [];
let fullSystemInstruction = "";
let currentCheckInfo = null;
let lastGameData = null;
let currentSlot = 1; // 預設使用欄位 1

window.onload = function() {
    const savedApiKey = localStorage.getItem('trpg_gemini_api_key');
    if (savedApiKey) {
        document.getElementById('api-key-input').value = savedApiKey;
    }
};

async function loadRulesFromFolder() {
    const fileList = [
        'rule/TRPG-我獨自升級(衍生版)總體規則.txt',
        'rule/世界觀設定與衍生規範.txt',
        'rule/角色生命值（HP）與恢復機制規範.txt',
        'rule/角色特性規範.txt',
        'rule/角色與魔物階級強度暨逐級（Lv.1-120）詳細規範手冊.txt',
        'rule/角色魔力值（MP）與恢復機制規範.txt',
        'rule/特殊晉升事件表.txt',
        'rule/遊戲主持人（GM）行為準則規範.txt',
        'rule/擲骰檢定與判定機制規範.txt',
        'rule/獵人公會結構與經營規範.txt',
        'rule/職業設定與二轉晉升規範.txt'
    ];

    let combinedRules = "你是一位經驗豐富、敘事生動且邏輯嚴謹的文字 TRPG Game Master (GM)。你主持的遊戲必須嚴格恪守以下全部字典與規範文件內容：\n\n";

    for (const fileName of fileList) {
        try {
            const res = await fetch(fileName);
            if (res.ok) {
                const text = await res.text();
                combinedRules += `\n\n=== [參考規範字典：${fileName}] ===\n` + text;
            } else {
                console.warn(`讀取檔案失敗 ${fileName}，HTTP 狀態: ${res.status}`);
            }
        } catch (e) {
            console.warn(`無法讀取檔案 ${fileName}，跳過該檔案。`, e);
        }
    }

    combinedRules += `
\n=========================================
【嚴格創角四步驟與獨立階段鎖定規範】
1. 【第一步驟：角色建立】：
   - 僅引導玩家輸入「角色姓名」與「角色性別」。
   - 狀態控制：【等待狀態】。在此步驟完成前，【嚴禁】發送職業或特性列表，也不得提供職業按鈕！

2. 【第二步驟：選擇覺醒職業】（玩家輸入姓名性別後觸發）：
   - 完整列出全部 8 種一階基礎職業（坦克、戰士、刺客、射手、攻擊魔法、召喚魔法、治療、輔助）之名稱、數值傾向與 3 項基礎技能。
   - 【絕對禁令】：在此步驟【嚴禁】提供或提及任何角色特性！options 選項陣列【只能】是單純的職業名稱（如：["1. 坦克", "2. 戰士", "3. 刺客", "4. 射手", "5. 攻擊魔法", "6. 召喚魔法", "7. 治療", "8. 輔助"]）。

3. 【第三步驟：選擇角色特性】（玩家確定職業後觸發）：
   - 在此步驟，GM 才可完整列出《角色特性規範手冊》中的全部 16 種正面特性名稱與效果。
   - options 選項陣列【只能】是單純的特性名稱（如：["1. 洞燭先機", "2. 金剛不壞體", "3. 鋼鐵意志"...等]）。【絕對嚴禁】將職業與特性合併在同一個選項中！

4. 【第四步驟：角色建立完成與隨機開場】：
   - 玩家選完特性後，始可進行【第四步驟】，執行隨機開場矩陣，給出第一個冒險行動抉擇。

=========================================
【最高優先級：原著劇情禁絕條款】
1. 本遊戲為原創衍生獨立故事，【絕對嚴禁】出現任何與《我獨自升級》原著小說/漫畫相同的特定劇情！
2. 嚴禁出現：「雙重地下城巨型至高石像」、「神殿守則（敬拜神/讚美神/證明信仰）」、「石像眼睛發射死亡光束」、「卡勒提農神殿」等原著情節！

=========================================
【動態成長鎖定與 JSON 輸出規範】
1. 初始 E 級獵人 Max MP 固定為 10 點，Max HP 固定為 20 點。未通關原創特殊晉升事件前，unlocked_growth 必須為 false。
2. 【擲骰規則】：遇到任何戰鬥攻擊、技能發動或風險檢定，【嚴禁自己代骰】，必須在 JSON 的 "require_dice_check" 填入 true，暫停等待玩家擲骰結果！
3. 你的每一次回應，必須 strict 僅輸出 JSON 格式：
{
  "player_status": {
    "name": "玩家姓名",
    "rank": "E級獵人",
    "unlocked_growth": false,
    "level": 1,
    "hp": 20,
    "max_hp": 20,
    "mp": 10,
    "max_mp": 10,
    "exp": 0,
    "max_exp": 100,
    "inventory": ["E級獵人執照", "破舊的匕首"]
  },
  "story_text": "生動劇情敘事內容...",
  "require_dice_check": false, 
  "dice_check_info": {
     "check_type": "行動/技能檢定名稱 (如: 力量攻擊 / 敏捷閃避)",
     "dc_desc": "難度描述與所需 DC (如: 門檻 DC 12)"
  },
  "options": [
    "選項 1",
    "選項 2",
    "選項 3"
  ]
}
`;
    return combinedRules;
}

async function callGeminiAPI(userInputText) {
    const apiKey = document.getElementById('api-key-input').value.trim();
    if (!apiKey) {
        alert("請先輸入有效的 Gemini API Key！");
        return null;
    }

    localStorage.setItem('trpg_gemini_api_key', apiKey);

    document.getElementById('loading').style.display = 'block';
    disableButtons(true);

    if (!fullSystemInstruction) {
        fullSystemInstruction = await loadRulesFromFolder();
    }

    chatHistory.push({ role: "user", parts: [{ text: userInputText }] });

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash-lite:generateContent?key=${apiKey}`;
    
    const requestBody = {
        system_instruction: {
            parts: [{ text: fullSystemInstruction }]
        },
        contents: chatHistory,
        generationConfig: {
            responseMimeType: "application/json"
        }
    };

    try {
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        });

        if (!response.ok) {
            const errorData = await response.json();
            alert(`API 呼叫失敗！\n錯誤代碼：${response.status}\n原因：${errorData.error?.message || '未知錯誤'}`);
            return null;
        }

        const data = await response.json();
        const aiResponseText = data.candidates[0].content.parts[0].text;
        
        chatHistory.push({ role: "model", parts: [{ text: aiResponseText }] });

        const parsedData = JSON.parse(aiResponseText);
        lastGameData = parsedData;

        // 背景自動儲存至目前欄位[cite: 4]
        saveGameToSlot(currentSlot, false);

        return parsedData;
    } catch (error) {
        console.error("執行錯誤：", error);
        alert(`發生錯誤：${error.message}`);
        return null;
    } finally {
        document.getElementById('loading').style.display = 'none';
        disableButtons(false);
    }
}

// 📂 多角色存檔管理邏輯[cite: 4]
function saveGameToSlot(slotId, showAlert = true) {
    if (chatHistory.length > 0 && lastGameData) {
        const charName = lastGameData.player_status?.name || '未命名獵人';
        const saveData = {
            chatHistory: chatHistory,
            lastGameData: lastGameData,
            savedTime: new Date().toLocaleString(),
            charName: charName
        };
        localStorage.setItem(`trpg_save_slot_${slotId}`, JSON.stringify(saveData));
        if (showAlert) {
            alert(`成功儲存至【存檔欄位 ${slotId}】！(角色：${charName})`);
        }
    } else if (showAlert) {
        alert("目前沒有可儲存的遊戲進度！");
    }
}

function loadGameFromSlot(slotId) {
    const rawSave = localStorage.getItem(`trpg_save_slot_${slotId}`);
    if (!rawSave) {
        alert(`【欄位 ${slotId}】目前沒有存檔！`);
        return;
    }

    try {
        const saveData = JSON.parse(rawSave);
        chatHistory = saveData.chatHistory;
        lastGameData = saveData.lastGameData;
        currentSlot = slotId;

        document.getElementById('story-panel').innerHTML = '';
        
        chatHistory.forEach(item => {
            if (item.role === 'model') {
                try {
                    const parsedModel = JSON.parse(item.parts[0].text);
                    appendStoryBlock(parsedModel.story_text);
                } catch(e) {}
            }
        });

        renderGame(lastGameData);
        closeSaveManager();
        alert(`成功載入【欄位 ${slotId}】！角色：${saveData.charName || '未知'}`);
    } catch (e) {
        alert("讀取存檔失敗，檔案格式可能損壞。");
    }
}

function deleteSlot(slotId) {
    if (confirm(`確定要刪除【存檔欄位 ${slotId}】的進度嗎？`)) {
        localStorage.removeItem(`trpg_save_slot_${slotId}`);
        openSaveManager(); // 刷新選單
    }
}

function openSaveManager() {
    const slotListEl = document.getElementById('slot-list');
    slotListEl.innerHTML = '';

    for (let i = 1; i <= 3; i++) {
        const rawSave = localStorage.getItem(`trpg_save_slot_${i}`);
        const slotCard = document.createElement('div');
        slotCard.className = 'slot-card';

        if (rawSave) {
            const data = JSON.parse(rawSave);
            slotCard.innerHTML = `
                <div>
                    <div class="slot-name">Slot ${i}: ${data.charName || '未知角色'} ${currentSlot === i ? '⭐(目前進度)' : ''}</div>
                    <div class="slot-info">時間: ${data.savedTime || '未知'}</div>
                </div>
                <div class="slot-btns">
                    <button class="btn save-btn" onclick="saveGameToSlot(${i}, true)">覆蓋</button>
                    <button class="btn send-btn" onclick="loadGameFromSlot(${i})">讀取</button>
                    <button class="btn" style="background:#c0392b; border-color:#e74c3c;" onclick="deleteSlot(${i})">刪除</button>
                </div>
            `;
        } else {
            slotCard.innerHTML = `
                <div>
                    <div class="slot-name">Slot ${i}: 空白存檔欄位</div>
                    <div class="slot-info">尚未儲存任何角色進度</div>
                </div>
                <div class="slot-btns">
                    <button class="btn save-btn" onclick="saveGameToSlot(${i}, true)">儲存至此</button>
                </div>
            `;
        }
        slotListEl.appendChild(slotCard);
    }

    document.getElementById('save-modal-overlay').style.display = 'flex';
}

function closeSaveManager() {
    document.getElementById('save-modal-overlay').style.display = 'none';
}

async function startGame() {
    if (chatHistory.length > 0) {
        if (!confirm("確定要開始新遊戲/建立新角色嗎？未手動儲存的舊進度可能會遺失！")) {
            return;
        }
    }
    chatHistory = [];
    fullSystemInstruction = "";
    document.getElementById('story-panel').innerHTML = '';
    
    const initPrompt = "遊戲開始。請嚴格執行開場初始化【第一步驟】：引導我建立角色（輸入角色姓名與性別）。在此步驟嚴禁列出職業或特性！";
    const gameData = await callGeminiAPI(initPrompt);

    if (gameData) {
        renderGame(gameData);
    }
}

async function makeChoice(optionText) {
    const gameData = await callGeminiAPI(`我選擇了：${optionText}`);
    if (gameData) {
        renderGame(gameData);
    }
}

async function sendCustomInput() {
    const inputEl = document.getElementById('custom-text-input');
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    const gameData = await callGeminiAPI(text);
    if (gameData) {
        renderGame(gameData);
    }
}

function handleKeyPress(event) {
    if (event.key === 'Enter') {
        sendCustomInput();
    }
}

function appendStoryBlock(text) {
    if (!text) return;
    const storyPanel = document.getElementById('story-panel');
    const newStoryBlock = document.createElement('div');
    newStoryBlock.className = 'story-text';
    newStoryBlock.innerText = `\n------------------------------\n${text}`;
    storyPanel.appendChild(newStoryBlock);
    storyPanel.scrollTop = storyPanel.scrollHeight;
}

function renderGame(data) {
    const status = data.player_status;
    document.getElementById('ui-name').innerText = `${status.name || '未命名'} (${status.rank || 'E級'})`;
    
    document.getElementById('ui-hp-text').innerText = `${status.hp} / ${status.max_hp}`;
    const hpPct = Math.max(0, Math.min(100, (status.hp / status.max_hp) * 100));
    document.getElementById('ui-hp-bar').style.width = `${hpPct}%`;

    document.getElementById('ui-mp-text').innerText = `${status.mp} / ${status.max_mp}`;
    const mpPct = Math.max(0, Math.min(100, (status.mp / status.max_mp) * 100));
    document.getElementById('ui-mp-bar').style.width = `${mpPct}%`;

    if (status.unlocked_growth) {
        document.getElementById('locked-status-item').style.display = 'none';
        document.getElementById('exp-status-item').style.display = 'flex';
        
        document.getElementById('ui-level-text').innerText = `Lv.${status.level} (${status.exp}/${status.max_exp})`;
        const expPct = Math.max(0, Math.min(100, (status.exp / status.max_exp) * 100));
        document.getElementById('ui-exp-bar').style.width = `${expPct}%`;
    } else {
        document.getElementById('locked-status-item').style.display = 'flex';
        document.getElementById('exp-status-item').style.display = 'none';
    }

    document.getElementById('ui-inventory').innerText = status.inventory && status.inventory.length > 0 ? status.inventory.join(', ') : '空無一物';

    appendStoryBlock(data.story_text);

    if (data.require_dice_check && data.dice_check_info) {
        currentCheckInfo = data.dice_check_info;
        showDiceOverlay(currentCheckInfo);
    } else {
        const choicesPanel = document.getElementById('button-options-container');
        choicesPanel.innerHTML = '';

        if (data.options && data.options.length > 0) {
            data.options.forEach((optText, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = `${index + 1}. ${optText}`;
                btn.onclick = () => makeChoice(optText);
                choicesPanel.appendChild(btn);
            });
        }

        // 🌟 固定第 4 個按鈕：手動儲存進度按鈕[cite: 4]
        const saveBtn = document.createElement('button');
        saveBtn.className = 'btn manual-save-option-btn';
        saveBtn.innerText = `4. 💾 儲存目前進度 (Slot ${currentSlot})`;
        saveBtn.onclick = () => saveGameToSlot(currentSlot, true);
        choicesPanel.appendChild(saveBtn);
    }
}

function showDiceOverlay(checkInfo) {
    document.getElementById('dice-title').innerText = `🎲 觸發檢定：${checkInfo.check_type || '行動檢定'}`;
    document.getElementById('dice-desc').innerText = checkInfo.dc_desc || '請投擲 D20 決定行動成敗';
    document.getElementById('dice-display').innerText = '🎲';
    document.getElementById('dice-btn').disabled = false;
    document.getElementById('dice-overlay').style.display = 'flex';
}

function rollDice() {
    const diceBtn = document.getElementById('dice-btn');
    diceBtn.disabled = true;
    const display = document.getElementById('dice-display');

    let counter = 0;
    const interval = setInterval(() => {
        display.innerText = Math.floor(Math.random() * 20) + 1;
        counter++;
        if (counter > 15) {
            clearInterval(interval);
            const finalRoll = Math.floor(Math.random() * 20) + 1;
            display.innerText = finalRoll;

            setTimeout(async () => {
                document.getElementById('dice-overlay').style.display = 'none';
                const resultText = `[玩家進行了 ${currentCheckInfo.check_type || '檢定'}]：原始 D20 骰出 ${finalRoll} 點！請根據規則與我的角色特性算式結算此行動結果。`;
                const gameData = await callGeminiAPI(resultText);
                if (gameData) {
                    renderGame(gameData);
                }
            }, 1200);
        }
    }, 60);
}

function disableButtons(disabled) {
    const buttons = document.querySelectorAll('#choices-panel .btn, #send-input-btn');
    const customInput = document.getElementById('custom-text-input');
    buttons.forEach(btn => btn.disabled = disabled);
    if (customInput) customInput.disabled = disabled;
}
</script>
